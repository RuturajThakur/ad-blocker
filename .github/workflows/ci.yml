name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel outdated runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Hard budget: fail the build if the gzipped Wasm exceeds this many bytes.
  # Phase 0: 1 MB (1_048_576) for hello-world; tighten to 512 KB by end of Phase 4.
  WASM_SIZE_BUDGET_BYTES: 1048576

jobs:
  # ---------------------------------------------------------------------------
  # Rust compiler crate
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (compiler crate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/filter-compiler-rs

    steps:
      - uses: actions/checkout@v4

      # Toolchain is pinned via rust-toolchain.toml — rustup honours it automatically.
      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/filter-compiler-rs

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --all-features --locked

      - name: Benches compile (not run)
        run: cargo bench --no-run --all-features

  # ---------------------------------------------------------------------------
  # Wasm build + size budget
  # ---------------------------------------------------------------------------
  wasm:
    name: Wasm build & size budget
    runs-on: ubuntu-latest
    needs: rust
    defaults:
      run:
        working-directory: packages/filter-compiler-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/filter-compiler-rs

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Binaryen (wasm-opt)
        run: |
          VER=version_119
          curl -L -o binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz"
          tar xf binaryen.tar.gz
          echo "$PWD/binaryen-${VER}/bin" >> "$GITHUB_PATH"

      - name: Build Wasm (web target)
        run: wasm-pack build --release --target web --out-dir pkg/web

      - name: Build Wasm (nodejs target)
        run: wasm-pack build --release --target nodejs --out-dir pkg/node

      - name: Optimise Wasm
        run: |
          wasm-opt -O3 --strip-debug \
            pkg/web/filter_compiler_rs_bg.wasm \
            -o pkg/web/filter_compiler_rs_bg.opt.wasm
          wasm-opt -O3 --strip-debug \
            pkg/node/filter_compiler_rs_bg.wasm \
            -o pkg/node/filter_compiler_rs_bg.opt.wasm

      - name: Measure and enforce size budget
        run: |
          RAW=$(stat -c%s pkg/web/filter_compiler_rs_bg.opt.wasm)
          GZ=$(gzip -9 -c pkg/web/filter_compiler_rs_bg.opt.wasm | wc -c)
          BR=$(command -v brotli >/dev/null && brotli -q 11 -c pkg/web/filter_compiler_rs_bg.opt.wasm | wc -c || echo "n/a")
          echo "::notice title=Wasm size::raw=${RAW}B gzip=${GZ}B brotli=${BR}B budget=${WASM_SIZE_BUDGET_BYTES}B"
          echo "wasm_raw=$RAW"    >> "$GITHUB_OUTPUT"
          echo "wasm_gzip=$GZ"    >> "$GITHUB_OUTPUT"
          if [ "$GZ" -gt "$WASM_SIZE_BUDGET_BYTES" ]; then
            echo "::error::Wasm gzipped size ${GZ}B exceeds budget ${WASM_SIZE_BUDGET_BYTES}B"
            exit 1
          fi

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ github.sha }}
          path: packages/filter-compiler-rs/pkg/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Fuzz smoke (runs a short fuzz burst on every PR — the real fuzzing is a
  # separate long-running workflow, not this one).
  # ---------------------------------------------------------------------------
  fuzz-smoke:
    name: Fuzz smoke (30s)
    runs-on: ubuntu-latest
    needs: rust
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: packages/filter-compiler-rs

    steps:
      - uses: actions/checkout@v4
      - name: Install nightly (required by cargo-fuzz)
        run: rustup toolchain install nightly --profile minimal
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/filter-compiler-rs
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Short fuzz burst
        run: |
          if [ -d fuzz ]; then
            cargo +nightly fuzz run lexer -- -max_total_time=30 || true
          else
            echo "No fuzz targets yet — skipping (expected during Phase 0)."
          fi

  # ---------------------------------------------------------------------------
  # Monorepo-wide JS/TS checks (Phase 0: placeholder; real work in Phase 1).
  # ---------------------------------------------------------------------------
  node:
    name: Node (monorepo lint + typecheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "No pnpm-lock.yaml yet — skipping install (expected until Phase 0 repo bootstrap is complete)."
          fi

      - name: Lint
        run: |
          if [ -f package.json ] && pnpm run --silent lint --if-present; then
            echo "lint ok"
          else
            echo "no lint script yet — skipping"
          fi

      - name: Typecheck
        run: |
          if [ -f package.json ] && pnpm run --silent typecheck --if-present; then
            echo "typecheck ok"
          else
            echo "no typecheck script yet — skipping"
          fi
