name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel outdated runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Hard budget: fail the build if the gzipped Wasm exceeds this many bytes.
  # Phase 0: 1 MB (1_048_576) for hello-world; tighten to 512 KB by end of Phase 4.
  WASM_SIZE_BUDGET_BYTES: 1048576

jobs:
  # ---------------------------------------------------------------------------
  # Rust compiler crate
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (compiler crate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/filter-compiler-rs

    steps:
      - uses: actions/checkout@v4

      # Toolchain is pinned via rust-toolchain.toml — rustup honours it automatically.
      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/filter-compiler-rs

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --all-features --locked

      - name: Benches compile (not run)
        run: cargo bench --no-run --all-features

  # ---------------------------------------------------------------------------
  # Wasm build + size budget
  # ---------------------------------------------------------------------------
  wasm:
    name: Wasm build & size budget
    runs-on: ubuntu-latest
    needs: rust
    defaults:
      run:
        working-directory: packages/filter-compiler-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/filter-compiler-rs

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Binaryen (wasm-opt)
        run: |
          VER=version_119
          curl -L -o binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz"
          tar xf binaryen.tar.gz
          echo "$PWD/binaryen-${VER}/bin" >> "$GITHUB_PATH"

      # Single `--target web` build to `pkg/` — the same layout local dev
      # produces. This is the layout `filter-compiler-js` consumes via its
      # `file:../filter-compiler-rs/pkg` dependency. Per the comment in
      # `packages/filter-compiler-js/node.ts`, the web target works in both
      # browsers and Node (Node loads the `.wasm` bytes manually via
      # `createRequire`), so we don't need a separate nodejs build.
      - name: Build Wasm
        run: wasm-pack build --release --target web --out-dir pkg

      # Optimise in-place so the `.wasm` consumed downstream is the same
      # bytes the size budget measures. Earlier this job kept an `*.opt.wasm`
      # alongside the original — that drifted the budget away from reality.
      - name: Optimise Wasm
        run: |
          wasm-opt -O3 --strip-debug \
            pkg/filter_compiler_rs_bg.wasm \
            -o pkg/filter_compiler_rs_bg.opt.wasm
          mv pkg/filter_compiler_rs_bg.opt.wasm pkg/filter_compiler_rs_bg.wasm

      - name: Measure and enforce size budget
        run: |
          WASM=pkg/filter_compiler_rs_bg.wasm
          RAW=$(stat -c%s "$WASM")
          GZ=$(gzip -9 -c "$WASM" | wc -c)
          BR=$(command -v brotli >/dev/null && brotli -q 11 -c "$WASM" | wc -c || echo "n/a")
          echo "::notice title=Wasm size::raw=${RAW}B gzip=${GZ}B brotli=${BR}B budget=${WASM_SIZE_BUDGET_BYTES}B"
          echo "wasm_raw=$RAW"    >> "$GITHUB_OUTPUT"
          echo "wasm_gzip=$GZ"    >> "$GITHUB_OUTPUT"
          if [ "$GZ" -gt "$WASM_SIZE_BUDGET_BYTES" ]; then
            echo "::error::Wasm gzipped size ${GZ}B exceeds budget ${WASM_SIZE_BUDGET_BYTES}B"
            exit 1
          fi

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ github.sha }}
          path: packages/filter-compiler-rs/pkg/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Fuzz smoke (runs a short fuzz burst on every PR — the real fuzzing is a
  # separate long-running workflow, not this one).
  # ---------------------------------------------------------------------------
  fuzz-smoke:
    name: Fuzz smoke (30s)
    runs-on: ubuntu-latest
    needs: rust
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: packages/filter-compiler-rs

    steps:
      - uses: actions/checkout@v4
      - name: Install nightly (required by cargo-fuzz)
        run: rustup toolchain install nightly --profile minimal
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/filter-compiler-rs
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Short fuzz burst
        run: |
          if [ -d fuzz ]; then
            cargo +nightly fuzz run lexer -- -max_total_time=30 || true
          else
            echo "No fuzz targets yet — skipping (expected during Phase 0)."
          fi

  # ---------------------------------------------------------------------------
  # JS/TS workspaces — typecheck, tests, full extension build.
  #
  # `needs: wasm` because @ad-blocker/filter-compiler-js declares the wasm
  # bundle as a `file:../filter-compiler-rs/pkg` dependency. Rather than
  # re-running wasm-pack here (slow), we download the artifact the wasm job
  # already uploaded and let pnpm resolve the file: link locally.
  #
  # The vendor/ filter lists are gitignored (only the ETag manifest is
  # committed). We cache them with a weekly key rotation:
  #   - Cache hit (most PRs): vendor/ restored in <1s. `lists:fetch` then
  #     re-validates ETags upstream — a 304 round-trip per file, no body
  #     transfer.
  #   - Cache miss (first run of a new ISO week, or fetch-lists.ts changed):
  #     full download (~5s, ~6 MB).
  # The point of the cache is not bandwidth (ETag handles that) but flake
  # immunity against transient upstream errors at easylist.to / fanboy.co.nz.
  # The weekly key rotation ensures we still pick up upstream URL changes
  # that ETags can't detect within a bounded window.
  # ---------------------------------------------------------------------------
  node:
    name: Node (typecheck, tests, build)
    runs-on: ubuntu-latest
    needs: wasm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Download the wasm-pack output the wasm job uploaded so the
      # `file:../filter-compiler-rs/pkg` dependency resolves at install time.
      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-${{ github.sha }}
          path: packages/filter-compiler-rs/pkg

      # ISO week-numbering year + ISO week number, e.g. "2026-W17". A fresh
      # tag every Monday rotates the cache. Computed in UTC so DST and
      # runner-local TZ never produce a key drift.
      - name: Compute weekly cache tag
        id: cache_key
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore vendor/ filter-list cache
        uses: actions/cache@v4
        with:
          path: apps/extension/vendor
          # `v1-` prefix is a manual invalidation knob: bump to `v2-` if the
          # vendor/ layout shape ever changes. Hashing fetch-lists.ts forces
          # a fresh fetch when the fetcher itself changes (e.g. new source
          # added). The week stamp forces at-least-weekly refreshes.
          # restore-keys lets last week's cache seed this week's fetch —
          # ETag will revalidate, so most files come back as 304s.
          key: vendor-v1-${{ hashFiles('apps/extension/scripts/fetch-lists.ts') }}-${{ steps.cache_key.outputs.week }}
          restore-keys: |
            vendor-v1-${{ hashFiles('apps/extension/scripts/fetch-lists.ts') }}-

      - name: Install JS/TS dependencies
        run: pnpm install --frozen-lockfile

      # Root `typecheck` script delegates via `pnpm -r --if-present run typecheck`,
      # which recurses into every workspace. Same for `test` below.
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # ETag-aware; near-zero bandwidth on a warm cache. Always-run because
      # the validation is essentially free and we never want CI to build
      # against an out-of-date list manifest.
      - name: Fetch filter lists
        run: pnpm --filter @ad-blocker/extension lists:fetch

      # Full pipeline: build:rulesets (compile vendor lists → DNR chunks +
      # per-source cosmetic bundles) then `vite build`. Catches manifest
      # entry mismatches, ruleset chunk overflows, crxjs configuration
      # errors — all things tests-with-fixtures don't cover.
      - name: Build extension
        run: pnpm --filter @ad-blocker/extension build
