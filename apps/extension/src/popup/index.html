<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ad Blocker</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 13px/1.4 system-ui, sans-serif; margin: 12px; min-width: 280px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .row { display: flex; justify-content: space-between; padding: 4px 0; }
      .muted { opacity: 0.7; }
      .actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
      button {
        font: inherit;
        padding: 6px 10px;
        border: 1px solid currentColor;
        background: transparent;
        color: inherit;
        border-radius: 4px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button[hidden] { display: none; }
      a.resume {
        font-size: 12px;
        color: inherit;
        opacity: 0.8;
        text-align: center;
        text-decoration: underline;
        cursor: pointer;
      }
      a.resume[hidden] { display: none; }
    </style>
  </head>
  <body>
    <h1>Ad Blocker</h1>
    <div class="row"><span>Status</span><span id="status" class="muted">—</span></div>
    <div class="row"><span>Blocked on this page</span><span id="count" class="muted">0</span></div>
    <div class="row"><span>Site</span><span id="host" class="muted">—</span></div>
    <div class="actions">
      <button id="pause" hidden>Pause on this site</button>
      <a id="resume-all" class="resume" hidden>Resume everywhere (<span id="paused-count">0</span> sites paused)</a>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
