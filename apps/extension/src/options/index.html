<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ad Blocker — Options</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 720px; margin: 32px auto; padding: 0 16px; }
      h1 { font-size: 20px; }
      section { margin-top: 24px; }
      label { display: block; margin: 6px 0; }
      .muted { opacity: 0.65; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Ad Blocker — Options</h1>
    <section>
      <h2>Filter lists</h2>
      <label><input type="checkbox" id="easylist" checked /> EasyList <span class="muted">— ad blocking (default on)</span></label>
      <label><input type="checkbox" id="easyprivacy" checked /> EasyPrivacy <span class="muted">— tracker blocking (default on)</span></label>
      <label><input type="checkbox" id="easylist-cookie" /> EasyList Cookie <span class="muted">— cookie banners (off by default; can break some sign-in flows)</span></label>
      <label><input type="checkbox" id="easylist-annoyances" /> EasyList Annoyances <span class="muted">— overlays, newsletter pop-ups, anti-adblock walls (off by default)</span></label>
    </section>
    <section>
      <h2>Updates</h2>
      <label>
        <input type="checkbox" id="autoRefresh" checked />
        Auto-refresh filter lists weekly
        <span class="muted">— fetches the latest cosmetic rules from upstream once a week. Network blocking rules are bundled with the extension and only change when you install an update.</span>
      </label>
      <p id="lastRefreshed" class="muted"></p>
    </section>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
